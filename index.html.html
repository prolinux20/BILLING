<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRUCK FLOW PRO | pro_linux20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap');

        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --dark-bg: #050b18;
        }

        body {
            background-color: var(--dark-bg);
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .cyber-header { font-family: 'Orbitron', sans-serif; }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
        }

        .sidebar {
            position: fixed; left: -100%; top: 0; width: 80%; height: 100%;
            background: rgba(5, 11, 24, 0.95); backdrop-filter: blur(20px);
            transition: 0.3s ease; z-index: 1000;
            border-right: 2px solid var(--neon-blue);
        }
        .sidebar.active { left: 0; }

        .input-glow:focus {
            outline: none;
            border-bottom: 2px solid var(--neon-blue);
            background: rgba(0, 242, 255, 0.05);
        }

        /* Fixed Manifest Alignment for Android Download */
        #finalReport { 
            width: 100%; 
            max-width: 500px; 
            background: #ffffff; 
            color: #000; 
            padding: 25px;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .manifest-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }

        .btn-main {
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.2);
        }
    </style>
</head>
<body class="p-4">

    <!-- Mobile Sidebar -->
    <div id="sidebar" class="sidebar p-8 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-10">
            <h2 class="cyber-header text-cyan-400 text-sm tracking-widest">MENU</h2>
            <button onclick="toggleSidebar()" class="text-white text-2xl">&times;</button>
        </div>
        <nav class="space-y-6 flex-grow">
            <button onclick="newFile()" class="flex items-center gap-4 w-full text-lg font-bold"><i class="fas fa-plus-circle text-cyan-400"></i> NEW ENTRY</button>
            <button onclick="loadOldFile()" class="flex items-center gap-4 w-full text-lg font-bold"><i class="fas fa-history text-purple-400"></i> PREVIOUS DATA</button>
        </nav>
        <div class="pt-6 border-t border-white/10 space-y-4">
            <a href="https://www.instagram.com/pro_linux20" class="flex items-center gap-3">
                <i class="fab fa-instagram text-pink-500 text-xl"></i> <span>pro_linux20</span>
            </a>
            <a href="https://whatsapp.com/channel/0029Vb5Vwvl5Ui2e9l5sOr2n" class="flex items-center gap-3">
                <i class="fab fa-whatsapp text-green-500 text-xl"></i> <span>WA Channel</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-md mx-auto pb-10">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <button onclick="toggleSidebar()" class="w-10 h-10 glass-card flex items-center justify-center text-cyan-400">
                <i class="fas fa-bars"></i>
            </button>
            <div class="text-center">
                <h1 class="cyber-header text-xl font-bold tracking-tighter">TRUCK FLOW PRO</h1>
                <p class="text-[8px] text-cyan-500/60 uppercase tracking-[0.3em]">System v4.5</p>
            </div>
            <div class="w-10"></div>
        </div>

        <!-- Input Form -->
        <div class="space-y-4">
            <div class="glass-card p-5 space-y-4">
                <input type="text" id="empName" placeholder="Driver Name" class="w-full bg-transparent border-b border-white/10 py-2 input-glow text-white text-lg">
                <input type="text" id="truckNo" placeholder="Truck Plate No." class="w-full bg-transparent border-b border-white/10 py-2 input-glow text-white text-lg">
                <input type="text" id="loadType" placeholder="Cargo Detail (e.g. Cement)" class="w-full bg-transparent border-b border-white/10 py-2 input-glow text-white text-lg">
                <input type="number" id="totalRent" placeholder="Total Fare (Rs)" class="w-full bg-transparent border-b border-white/10 py-2 input-glow text-green-400 font-bold text-xl" oninput="calculateTotal()">
            </div>

            <!-- Expenses -->
            <div class="glass-card p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xs font-bold text-purple-400 uppercase tracking-widest">Expenses</h3>
                    <button onclick="addExpenseRow()" class="bg-purple-500/20 text-purple-400 px-3 py-1 rounded text-[10px]">+ ADD</button>
                </div>
                <div id="expenseList" class="space-y-3">
                    <div class="flex gap-2">
                        <input type="text" placeholder="Diesel/Toll" class="item-name flex-1 bg-white/5 p-2 rounded text-sm outline-none">
                        <input type="number" placeholder="Cost" class="item-amount w-24 bg-white/5 p-2 rounded text-right text-sm outline-none" oninput="calculateTotal()">
                    </div>
                </div>
            </div>

            <!-- Profit Card -->
            <div class="glass-card p-6 text-center border-b-4 border-cyan-500">
                <p class="text-[10px] text-gray-500 uppercase mb-2">Net Profit (PKR)</p>
                <div class="text-4xl font-black text-white" id="displayNet">0</div>
            </div>

            <button onclick="saveAndGenerate()" class="w-full btn-main py-4 rounded-xl text-white font-bold text-lg">GENERATE RECEIPT</button>
        </div>

        <!-- Manifest Section (Image Format) -->
        <div id="reportWrapper" class="hidden mt-10">
            <div id="finalReport">
                <div style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px;">
                    <h2 style="margin:0; font-size: 24px; font-weight: 900;">TRUCK MANIFEST</h2>
                    <p id="rDate" style="margin:5px 0; font-size: 12px; font-weight: bold;"></p>
                </div>
                
                <div style="font-size: 14px; margin-bottom: 20px;">
                    <div class="manifest-row"><strong>Driver:</strong> <span id="rEmp"></span></div>
                    <div class="manifest-row"><strong>Truck:</strong> <span id="rTruck"></span></div>
                    <div class="manifest-row"><strong>Cargo:</strong> <span id="rCargo"></span></div>
                </div>

                <div id="rTableBody" style="margin-bottom: 20px;">
                    <!-- Expense items will appear here -->
                </div>

                <div style="background: #000; color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center;">
                    <span style="font-size: 12px; font-weight: bold;">TOTAL PROFIT:</span>
                    <span id="rFinal" style="font-size: 22px; font-weight: 900; italic"></span>
                </div>
                
                <p style="text-align: center; font-size: 8px; margin-top: 20px; opacity: 0.5;">POWERED BY PRO_LINUX20</p>
            </div>

            <button onclick="downloadImage()" class="w-full mt-4 bg-green-600 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2">
                <i class="fas fa-download"></i> DOWNLOAD PNG
            </button>
        </div>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function addExpenseRow() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 animate__animated animate__fadeInUp';
            div.innerHTML = `
                <input type="text" placeholder="Detail" class="item-name flex-1 bg-white/5 p-2 rounded text-sm">
                <input type="number" placeholder="Cost" class="item-amount w-24 bg-white/5 p-2 rounded text-right text-sm" oninput="calculateTotal()">
                <button onclick="this.parentElement.remove(); calculateTotal()" class="text-red-500 px-1"><i class="fas fa-times"></i></button>
            `;
            document.getElementById('expenseList').appendChild(div);
        }

        function calculateTotal() {
            const rent = parseFloat(document.getElementById('totalRent').value) || 0;
            const amounts = document.getElementsByClassName('item-amount');
            let totalExp = 0;
            for (let amt of amounts) { totalExp += parseFloat(amt.value) || 0; }
            const net = rent - totalExp;
            document.getElementById('displayNet').innerText = net.toLocaleString();
            return { totalExp, net, rent };
        }

        function saveAndGenerate() {
            const results = calculateTotal();
            const data = {
                empName: document.getElementById('empName').value || "N/A",
                truckNo: document.getElementById('truckNo').value || "N/A",
                loadType: document.getElementById('loadType').value || "GENERAL",
                totalRent: results.rent,
                net: results.net,
                expenses: []
            };

            const names = document.getElementsByClassName('item-name');
            const amounts = document.getElementsByClassName('item-amount');
            for (let i = 0; i < names.length; i++) {
                if(amounts[i].value > 0) {
                    data.expenses.push({ name: names[i].value || "Misc", amount: amounts[i].value });
                }
            }

            localStorage.setItem('truckData_v4', JSON.stringify(data));
            renderReport(data);
        }

        function renderReport(data) {
            document.getElementById('rDate').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('rEmp').innerText = data.empName;
            document.getElementById('rTruck').innerText = data.truckNo;
            document.getElementById('rCargo').innerText = data.loadType;
            document.getElementById('rFinal').innerText = data.net.toLocaleString();

            const table = document.getElementById('rTableBody');
            table.innerHTML = `<div class="manifest-row" style="font-weight:bold"><span>Rent (Revenue)</span><span>+ ${data.totalRent.toLocaleString()}</span></div>`;
            
            data.expenses.forEach(exp => {
                table.innerHTML += `<div class="manifest-row"><span>${exp.name}</span><span>- ${parseFloat(exp.amount).toLocaleString()}</span></div>`;
            });

            document.getElementById('reportWrapper').classList.remove('hidden');
            window.scrollTo(0, document.body.scrollHeight);
        }

        function downloadImage() {
            const report = document.getElementById('finalReport');
            html2canvas(report, { scale: 3 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Receipt_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function loadOldFile() {
            const saved = localStorage.getItem('truckData_v4');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('empName').value = data.empName;
                document.getElementById('truckNo').value = data.truckNo;
                document.getElementById('totalRent').value = data.totalRent;
                document.getElementById('loadType').value = data.loadType;
                calculateTotal();
                toggleSidebar();
            } else {
                alert("No history found.");
            }
        }

        function newFile() {
            if(confirm("Clear current data?")) window.location.reload();
        }
    </script>
</body>
</html>
